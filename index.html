<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Andy's Birthday Party</title>

<style>

body{
font-family: Arial, sans-serif;
text-align:center;
background:linear-gradient(135deg,#0383f8,#73b8f7);
color:#333;
padding:20px;
}

.card{
background:white;
border-radius:15px;
padding:25px;
max-width:500px;
margin:auto;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

img{
width:100%;
border-radius:10px;
}

h1{
margin-top:10px;
}

.countdown{
font-size:22px;
margin:15px 0;
font-weight:bold;
}

button{
display:block;
width:90%;
margin:10px auto;
padding:14px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
background:#016ccc;
color:white;
}

button:hover{
background:#0069c7;
}

.secondary{
background:#6c63ff;
}

.secondary:hover{
background:#5a52e0;
}

</style>

</head>

<body>

<div class="card">

<h1>🎉 Andy's Birthday 🎉</h1>

<img src="invitation.jpg">

<p>April 3 – 2:00 PM</p>
<p>4451 Wilder Pl</p>

<div class="countdown" id="countdown"></div>

<button onclick="rsvpYes()">YES I'M COMING 🎉</button>

<button onclick="location.href='sms:7027279280?body=RSVP NO Andy Birthday'">
CAN'T MAKE IT 😢
</button>

<button class="secondary"
onclick="location.href='sms:7027279280?body=RSVP Andy Birthday'">
TEXT RSVP
</button>

<button class="secondary"
onclick="location.href='https://maps.google.com/?q=4451+Wilder+pl'">
OPEN MAP
</button>

<button class="secondary"
onclick="location.href='https://calendar.google.com/calendar/render?action=TEMPLATE&text=Andy+Birthday&dates=20260403T140000/20260503T170000&details=Birthday+Party&location=4451+Wilder+pl'">
ADD TO CALENDAR
</button>

</div>

<script>

var partyDate = new Date("April 3, 2026 14:00:00").getTime();

var timer = setInterval(function(){

var now = new Date().getTime();
var distance = partyDate - now;

var days = Math.floor(distance / (1000*60*60*24));
var hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
var minutes = Math.floor((distance%(1000*60*60))/(1000*60));

document.getElementById("countdown").innerHTML =
"⏳ "+days+" days "+hours+"h "+minutes+"m until the party!";

},1000);

function rsvpYes(){

confetti();

window.location.href="sms:7027279280?body=RSVP YES Andy Birthday";

}

function confetti(){

for(let i=0;i<50;i++){

let c=document.createElement("div");

c.style.position="fixed";
c.style.width="10px";
c.style.height="10px";
c.style.background="hsl("+Math.random()*360+",100%,50%)";
c.style.left=Math.random()*100+"vw";
c.style.top="-10px";

document.body.appendChild(c);

let fall=setInterval(()=>{

c.style.top=parseInt(c.style.top)+5+"px";

if(parseInt(c.style.top)>window.innerHeight){
clearInterval(fall);
c.remove();
}

},20);

}

}

</script>

</body>
</html>
