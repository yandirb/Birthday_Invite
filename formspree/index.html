```html
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Birthday Party</title>

<style>
body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#0f4c81,#5dade2);
padding:20px;
}

.card{
background:white;
max-width:500px;
margin:auto;
padding:25px;
border-radius:15px;
}

img{width:100%;border-radius:10px;}

input{
width:80%;
padding:10px;
margin:8px;
}

button{
width:85%;
padding:14px;
margin:10px auto;
border:none;
border-radius:8px;
background:#1f78d1;
color:white;
font-size:18px;
}

.secondary{background:#34495e;}
</style>
</head>

<body>

<div class="card">

<h1>🎉 Birthday Party 🎉</h1>

<img src="../invitation.jpg">

<p><b>April 3, 2026 — 2:00 PM</b></p>
<p>123 Party Street</p>

<input id="name" name="name" placeholder="Your name">
<input id="guests" name="guests" placeholder="Number of guests">

<form action="https://formspree.io/f/xkoqjkzb" method="POST">

<input type="hidden" name="name" id="hiddenName">
<input type="hidden" name="guests" id="hiddenGuests">

<button type="submit" onclick="prepareForm()">YES I'M COMING 🎉</button>

</form>

<button onclick="rsvpNo()">CAN'T MAKE IT 😢</button>

<button class="secondary" onclick="textRSVP()">TEXT RSVP</button>

<button class="secondary"
onclick="location.href='https://maps.google.com/?q=123+Party+Street'">
OPEN MAP
</button>

<button class="secondary"
onclick="location.href='https://calendar.google.com/calendar/render?action=TEMPLATE&text=Birthday+Party&dates=20260403T140000/20260403T170000&location=123+Party+Street'">
ADD TO CALENDAR
</button>

</div>

<script>

function prepareForm(){
document.getElementById("hiddenName").value=
document.getElementById("name").value;

document.getElementById("hiddenGuests").value=
document.getElementById("guests").value;
}

function rsvpNo(){
var name=document.getElementById("name").value;

window.location.href="sms:7021234567?body="+
encodeURIComponent("Hi this is "+name+" RSVP NO for the Birthday Party");
}

function textRSVP(){
var name=document.getElementById("name").value;
var guests=document.getElementById("guests").value;

window.location.href="sms:7021234567?body="+
encodeURIComponent("Hi this is "+name+" ("+guests+" guests) RSVP for the Birthday Party");
}

</script>

</body>
</html>
```
