<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Birthday Party</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#0a3d62,#4da3ff);
margin:0;
padding:20px;
overflow-x:hidden;
}

.card{
background:white;
max-width:520px;
margin:auto;
padding:25px;
border-radius:15px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

img{
width:100%;
border-radius:10px;
}

input{
width:85%;
padding:10px;
margin:8px;
font-size:16px;
}

button{
width:90%;
padding:14px;
margin:8px;
border:none;
border-radius:8px;
font-size:18px;
background:#1e88e5;
color:white;
}

.secondary{
background:#34495e;
}

#countdown{
font-size:20px;
margin:10px;
}

.balloon{
position:fixed;
bottom:-120px;
width:40px;
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

</style>

</head>

<body>

<div class="card">

<h1>🎉 Birthday Party 🎉</h1>

<img src="../invitation.jpg">

<h3>April 3, 2026 — 2:00 PM</h3>

<div id="countdown"></div>

<div id="globalGuests">Guests Coming: ...</div>

<input id="name" placeholder="Your name">

<input id="guests" placeholder="Number of guests">

<form action="https://formspree.io/f/xkoqjkzb" method="POST">

<input type="hidden" name="name" id="hiddenName">

<input type="hidden" name="guests" id="hiddenGuests">

<button type="submit" onclick="prepare()">YES I'M COMING 🎉</button>

</form>

<button onclick="rsvpNo()">CAN'T MAKE IT 😢</button>

<button class="secondary" onclick="textRSVP()">TEXT RSVP</button>

<button class="secondary"
onclick="location.href='https://maps.google.com/?q=123+Party+Street'">
OPEN MAP
</button>

<button class="secondary"
onclick="location.href='https://calendar.google.com/calendar/render?action=TEMPLATE&text=Birthday+Party&dates=20260403T140000/20260403T170000&location=123+Party+Street'">
ADD TO CALENDAR
</button>

<h3>Guests on this device</h3>

<ul id="guestList"></ul>

</div>

<script>

const BIN_ID = "69b082521687bc351c7af686";
const API_KEY = "$2a$10$Z1nAZHdaXyDXTaXQw1UQQewbo9Z4mv27z6.cJQDUzNh0Zri0Ayw3O";

var partyDate = new Date("April 3, 2026 14:00:00").getTime();

setInterval(function(){

var now = new Date().getTime();

var distance = partyDate - now;

var days = Math.floor(distance/(1000*60*60*24));

var hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));

var minutes = Math.floor((distance%(1000*60*60))/(1000*60));

document.getElementById("countdown").innerHTML =
days+" days "+hours+" hrs "+minutes+" min";

},1000);


function prepare(){

var name=document.getElementById("name").value;

var guests=document.getElementById("guests").value;

document.getElementById("hiddenName").value=name;

document.getElementById("hiddenGuests").value=guests;

saveGuest(name,guests);

var guests = parseInt(document.getElementById("guests").value) || 1;

updateGlobalGuests(guests);

confetti();

}


function saveGuest(name,guests){

var list=JSON.parse(localStorage.getItem("guests")||"[]");

list.push(name+" ("+guests+")");

localStorage.setItem("guests",JSON.stringify(list));

displayGuests();

}
async function loadGuests(){

let res = await fetch(
"https://api.jsonbin.io/v3/b/"+BIN_ID+"/latest",
{
headers:{
"X-Master-Key":API_KEY
}
}
);

let data = await res.json();

document.getElementById("globalGuests").innerText =
"Guests Coming: " + data.record.guests;

}


function displayGuests(){

var list=JSON.parse(localStorage.getItem("guests")||"[]");

var ul=document.getElementById("guestList");

ul.innerHTML="";

list.forEach(function(g){

var li=document.createElement("li");

li.textContent=g;

ul.appendChild(li);

});

}

displayGuests();
async function updateGlobalGuests(add){

let res = await fetch(
"https://api.jsonbin.io/v3/b/"+BIN_ID+"/latest",
{
headers:{
"X-Master-Key":API_KEY
}
}
);

let data = await res.json();

let total = data.record.guests + add;

await fetch(
"https://api.jsonbin.io/v3/b/"+BIN_ID,
{
method:"PUT",
headers:{
"Content-Type":"application/json",
"X-Master-Key":API_KEY
},
body: JSON.stringify({guests: total})
}
);

loadGuests();

}


function textRSVP(){

var name=document.getElementById("name").value;

var guests=document.getElementById("guests").value;

window.location.href="sms:7021234567?body="+
encodeURIComponent("Hi this is "+name+" with "+guests+" guests for the Birthday Party");

}

function rsvpNo(){

var name=document.getElementById("name").value;

window.location.href="sms:7021234567?body="+
encodeURIComponent("Hi this is "+name+" can't make it to the Birthday Party");

}


function confetti(){

for(let i=0;i<40;i++){

let c=document.createElement("div");

c.style.position="fixed";

c.style.width="8px";

c.style.height="8px";

c.style.background="hsl("+Math.random()*360+",80%,60%)";

c.style.left=Math.random()*100+"%";

c.style.top="-10px";

c.style.animation="fall 3s linear";

document.body.appendChild(c);

setTimeout(()=>c.remove(),3000);

}

}
/*loadGuests();*/
</script>

<img class="balloon" style="left:10%" src="https://pngimg.com/uploads/balloon/balloon_PNG4967.png">

<img class="balloon" style="left:50%" src="https://pngimg.com/uploads/balloon/balloon_PNG4968.png">

<img class="balloon" style="left:80%" src="https://pngimg.com/uploads/balloon/balloon_PNG4966.png">

</body>

</html>
