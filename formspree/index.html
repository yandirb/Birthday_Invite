<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Birthday Party RSVP</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#0f4c81,#5dade2);
padding:20px;
}

.card{
background:white;
max-width:500px;
margin:auto;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

img{width:100%;border-radius:10px;}

input{
width:80%;
padding:10px;
margin:8px;
}

button{
width:85%;
padding:14px;
margin:10px auto;
border:none;
border-radius:8px;
background:#1f78d1;
color:white;
font-size:18px;
}

#guestList{
margin-top:20px;
text-align:left;
}

</style>
</head>

<body>

<div class="card">

<h1>🎉 Birthday Party 🎉</h1>

<img src="../invitation.jpg">

<p><b>April 3, 2026 — 2:00 PM</b></p>
<p>123 Party Street</p>

<h3 id="countdown"></h3>

<form action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST">

<input name="name" id="name" placeholder="Your name">

<input name="guests" id="guests" placeholder="Number of guests">

<button type="submit" onclick="confetti();addGuest()">YES I'M COMING 🎉</button>

</form>

<button onclick="rsvpNo()">CAN'T MAKE IT 😢</button>

<div id="guestCounter"></div>
<div id="guestList"></div>

</div>

<script>

var partyDate=new Date("April 3, 2026 14:00:00").getTime();

setInterval(function(){

var now=new Date().getTime();
var distance=partyDate-now;

var d=Math.floor(distance/(1000*60*60*24));
var h=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
var m=Math.floor((distance%(1000*60*60))/(1000*60));

document.getElementById("countdown").innerHTML=
"⏳ "+d+" days "+h+"h "+m+"m";

},1000);

function rsvpNo(){
window.location.href="sms:7021234567?body=RSVP NO Birthday Party";
}

function addGuest(){

var name=document.getElementById("name").value;
var guests=document.getElementById("guests").value;

var list=JSON.parse(localStorage.getItem("guests")||"[]");

list.push({name:name,guests:guests});

localStorage.setItem("guests",JSON.stringify(list));

renderGuests();
}

function renderGuests(){

var list=JSON.parse(localStorage.getItem("guests")||"[]");

var total=0;
var html="<h3>👥 Guests coming</h3>";

list.forEach(g=>{
total+=Number(g.guests||1);
html+=g.name+" +"+g.guests+"<br>";
});

document.getElementById("guestList").innerHTML=html;
document.getElementById("guestCounter").innerHTML=
"<h3>"+total+" guests attending</h3>";
}

renderGuests();

function confetti(){
for(let i=0;i<40;i++){
let c=document.createElement("div");
c.style.position="fixed";
c.style.width="8px";
c.style.height="8px";
c.style.background="hsl("+Math.random()*360+",100%,50%)";
c.style.left=Math.random()*100+"vw";
c.style.top="-10px";
document.body.appendChild(c);

let fall=setInterval(()=>{
c.style.top=parseInt(c.style.top)+5+"px";
if(parseInt(c.style.top)>window.innerHeight){
clearInterval(fall);
c.remove();
}
},20);
}
}

</script>

</body>
</html>
