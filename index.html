<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Birthday Party</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#0f4c81,#5dade2);
padding:20px;
color:#333;
}

.card{
background:white;
max-width:500px;
margin:auto;
padding:25px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

img{
width:100%;
border-radius:10px;
}

input{
width:80%;
padding:10px;
margin:8px;
font-size:16px;
}

button{
display:block;
width:85%;
margin:10px auto;
padding:14px;
font-size:18px;
border:none;
border-radius:8px;
background:#1f78d1;
color:white;
cursor:pointer;
}

button:hover{
background:#155a9c;
}

.secondary{
background:#34495e;
}

.secondary:hover{
background:#2c3e50;
}

.balloon{
position:fixed;
bottom:-100px;
width:40px;
height:50px;
border-radius:50%;
animation:float 12s infinite;
opacity:0.9;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

</style>
</head>

<body>

<div class="card">

<h1>🎉 Birthday Party 🎉</h1>

<img src="invitation.jpg">

<p><b>April 3, 2026 — 2:00 PM</b></p>
<p>123 Party Street</p>

<h3 id="countdown"></h3>

<input id="name" placeholder="Your name">
<input id="guests" placeholder="Number of guests">

<button onclick="rsvpYes()">YES I'M COMING 🎉</button>

<button onclick="rsvpNo()">CAN'T MAKE IT 😢</button>

<button class="secondary"
onclick="textRSVP()">TEXT RSVP</button>

<button class="secondary"
onclick="location.href='https://maps.google.com/?q=123+Party+Street'">
OPEN MAP
</button>

<button class="secondary"
onclick="location.href='https://calendar.google.com/calendar/render?action=TEMPLATE&text=Birthday+Party&dates=20260403T140000/20260403T170000&details=Birthday+Party&location=123+Party+Street'">
ADD TO CALENDAR
</button>

</div>

<script>

var partyDate=new Date("April 3, 2026 14:00:00").getTime();

setInterval(function(){

var now=new Date().getTime();
var distance=partyDate-now;

if(distance<0){
document.getElementById("countdown").innerHTML="🎉 The party is today!";
return;
}

var d=Math.floor(distance/(1000*60*60*24));
var h=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
var m=Math.floor((distance%(1000*60*60))/(1000*60));

document.getElementById("countdown").innerHTML=
"⏳ "+d+" days "+h+"h "+m+"m until the party!";

},1000);

function rsvpYes(){

confetti();

var name=document.getElementById("name").value;
var guests=document.getElementById("guests").value;

var msg="Hi this is "+name+" ("+guests+" guests) RSVP YES for the Birthday Party";

window.location.href="sms:7021234567?body="+encodeURIComponent(msg);

}

function rsvpNo(){

var name=document.getElementById("name").value;

var msg="Hi this is "+name+" RSVP NO for the Birthday Party";

window.location.href="sms:7021234567?body="+encodeURIComponent(msg);

}

function textRSVP(){

var name=document.getElementById("name").value;
var guests=document.getElementById("guests").value;

var msg="Hi this is "+name+" ("+guests+" guests) RSVP for the Birthday Party";

window.location.href="sms:7021234567?body="+encodeURIComponent(msg);

}

function confetti(){

for(let i=0;i<40;i++){

let c=document.createElement("div");

c.style.position="fixed";
c.style.width="8px";
c.style.height="8px";
c.style.background="hsl("+Math.random()*360+",100%,50%)";
c.style.left=Math.random()*100+"vw";
c.style.top="-10px";

document.body.appendChild(c);

let fall=setInterval(()=>{

c.style.top=parseInt(c.style.top)+5+"px";

if(parseInt(c.style.top)>window.innerHeight){

clearInterval(fall);
c.remove();

}

},20);

}

}

for(let i=0;i<10;i++){

let b=document.createElement("div");

b.className="balloon";

b.style.left=Math.random()*100+"vw";

b.style.background="hsl("+Math.random()*360+",70%,60%)";

b.style.animationDuration=(8+Math.random()*6)+"s";

document.body.appendChild(b);

}

</script>

</body>
</html>
